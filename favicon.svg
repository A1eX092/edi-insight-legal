<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1015"/>
      <stop offset="0.55" stop-color="#13161F"/>
      <stop offset="1" stop-color="#1B1F2B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#3B5B8F" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#3B5B8F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6FA0F0"/>
      <stop offset="1" stop-color="#3E6BCB"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- EDI monogram, big and bold so it reads even small -->
  <text x="256" y="312" text-anchor="middle"
        font-family="DejaVu Serif, Georgia, serif" font-weight="bold"
        font-size="190" fill="#F4F6FA" letter-spacing="2">EDI</text>

  <!-- accent underline -->
  <rect x="146" y="346" width="220" height="14" rx="7" fill="url(#accent)"/>
</svg>
